name: Refresh data & deploy

on:
  schedule:
    - cron: "17 * * * *" # hourly, off the minute-0 rush
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Fails non-zero on any source error; the previous cache is then kept
      # and deployed as-is (never publish zeros — P0-03 lesson).
      - name: Run pipeline
        run: node pipeline/fetch.mjs
        env:
          ETH_RPC_URL: ${{ vars.ETH_RPC_URL || 'https://ethereum-rpc.publicnode.com' }}

      - name: Commit updated cache
        run: |
          git config user.name "buyflow-bot"
          git config user.email "actions@users.noreply.github.com"
          git add web/data/flow.json
          git diff --cached --quiet || git commit -m "data: refresh flow.json"
          git push

      # Pinned release binary, installed in a step with no secrets in env.
      - name: Install aleph CLI
        run: |
          curl -fsSL -o /usr/local/bin/aleph \
            https://github.com/aleph-im/aleph-rs/releases/download/v0.12.0/aleph-cli-linux-x86_64
          chmod +x /usr/local/bin/aleph
          aleph --version

      # Signed mirror of the data on the Aleph network (key "buyflow" under
      # the deploy wallet). Reads the live aggregate first and only posts a
      # message when the content actually changed.
      - name: Publish Aleph aggregate (skips if unchanged)
        env:
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
        run: node pipeline/publish-aggregate.mjs

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-aleph:
    needs: refresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # include the data commit the refresh job just pushed

      - name: Deploy on Aleph Cloud
        uses: aleph-im/web3-hosting-action@v1.1.4
        with:
          path: web
          private-key: ${{ secrets.ALEPH_PRIVATE_KEY }}
          domain: flow.aleph.cloud
